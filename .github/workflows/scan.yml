name: Stock scan

on:
  # Every 30 min across 04:00–22:30 UTC. Lithuania is UTC+3 (summer) / UTC+2 (winter),
  # so this window covers ~07:00–24:00 local all year. GitHub cron is UTC-only.
  schedule:
    - cron: '*/30 4-22 * * *'
  # Manual "run now" button in the Actions tab.
  workflow_dispatch:

# Prevent overlapping runs (a slow scan won't collide with the next schedule tick).
concurrency:
  group: stock-scan
  cancel-in-progress: false

permissions:
  contents: write   # commit the updated data/state.json snapshot

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scan
        id: scan
        run: npm run scan

      - name: Commit updated snapshot
        run: |
          if [[ -n "$(git status --porcelain data/state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/state.json
            git commit -m "chore: update stock snapshot [skip ci]"
            git push
          else
            echo "No snapshot changes to commit."
          fi

      - name: Email on stock changes
        if: steps.scan.outputs.has_changes == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Ram Scanner <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.scan.outputs.subject }}
          html_body: file://report.html
          body: file://report.md
