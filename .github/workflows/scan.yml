name: Stock scan

on:
  # Twice per hour at :06 and :36, across 04:00–20:59 UTC. GitHub cron is UTC-only and
  # does NOT follow DST. Lithuania is UTC+3 (EEST, summer) / UTC+2 (EET, winter), so:
  #   • summer: ~07:06–23:36 local   • winter: ~06:06–22:36 local
  # The old upper bound (22 UTC) fired at 01:36 local and, with GitHub's ~1h scheduling
  # lag, drifted to ~02:40 — hence the night messages. Capping at 20 UTC keeps every run
  # (even a delayed one) out of the middle of the night while still covering the evening.
  # Off-peak minutes (not :00/:30) fire more reliably — GitHub drops jobs that pile up on
  # the hour/half-hour.
  schedule:
    - cron: '6,36 4-20 * * *'
  # Manual "run now" button in the Actions tab.
  workflow_dispatch:

# Prevent overlapping runs (a slow scan won't collide with the next schedule tick).
concurrency:
  group: stock-scan
  cancel-in-progress: false

permissions:
  contents: write   # commit the updated data/state.json snapshot

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scan
        id: scan
        run: npm run scan

      - name: Commit updated snapshot
        run: |
          if [[ -n "$(git status --porcelain data/state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/state.json
            git commit -m "chore: update stock snapshot [skip ci]"
            git push
          else
            echo "No snapshot changes to commit."
          fi

      - name: Email on stock changes
        if: steps.scan.outputs.has_changes == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Ram Scanner <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.scan.outputs.subject }}
          html_body: file://report.html
          body: file://report.md

      # Runs even if the email step failed, so the two channels are independent.
      - name: Telegram on stock changes
        if: ${{ always() && steps.scan.outputs.has_changes == 'true' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -z "$TELEGRAM_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Telegram secrets not set — skipping."; exit 0
          fi
          curl -sS --fail-with-body -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@report.telegram.txt" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
